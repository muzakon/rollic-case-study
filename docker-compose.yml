services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./server:/app
      - go_modules:/go/pkg/mod
    ports:
      - "3000:3000"
    command: >
      sh -c "air -c .air.toml || air --build.cmd 'go build -o ./tmp/main ./cmd/api' --build.bin './tmp/main'"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server/.env

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  go_modules: