root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "toml", "yaml", "yml"]
  exclude_dir = ["tmp", "vendor", "test", ".git"]
  exclude_regex = ["_test\\.go"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
